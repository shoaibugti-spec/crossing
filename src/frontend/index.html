<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crossingate</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#004B49" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crossingate" />
    <link rel="apple-touch-icon" href="https://kdbnmoqzcncvkwcbzhxc.supabase.co/storage/v1/object/public/brand-assets/logo.png" />

    <!-- SEO -->
    <meta name="description" content="World's Trusted Visa Marketplace — KYC-verified providers, Escrow-protected payments." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://kdbnmoqzcncvkwcbzhxc.supabase.co/storage/v1/object/public/brand-assets/logo.png" />

    <!-- Google Translate hide toolbar -->
    <style>
      .goog-te-banner-frame { display: none !important; }
      .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      .goog-te-gadget { font-size: 0 !important; }
      .goog-te-gadget select {
        font-size: 14px !important;
        border-radius: 12px !important;
        border: 1.5px solid #e5e7eb !important;
        padding: 9px 12px !important;
        outline: none !important;
        width: 100% !important;
        background: #f9fafb !important;
        color: #1f2937 !important;
        cursor: pointer !important;
        margin: 0 !important;
      }
      .goog-te-gadget > span { display: none !important; }
      .goog-logo-link { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
